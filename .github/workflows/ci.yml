# CI optimized for self-hosted runner setup:
# - 4 runners on single machine (8c/16t, 32GB RAM, NVMe)
# - Rust jobs run sequentially to share toolchain and avoid /tmp issues
# - Bun tests run in parallel with Rust jobs
name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Fast checks - tests, clippy, audit
  rust-fast:
    name: Rust Fast (tests + clippy + audit)
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
      RUSTUP_HOME: /tmp/rust-${{ github.run_id }}/.rustup
      CARGO_HOME: /tmp/rust-${{ github.run_id }}/.cargo
    steps:
      - uses: actions/checkout@v4

      - name: Clean old rust dirs
        run: |
          # Remove rust dirs from previous runs (keep only current run_id)
          find /tmp -maxdepth 1 -name 'rust-*' -type d ! -name 'rust-${{ github.run_id }}' -mmin +60 -exec rm -rf {} \; 2>/dev/null || true

      - name: Install ripgrep (for act compatibility)
        run: command -v rg >/dev/null 2>&1 || (apt-get update && apt-get install -y ripgrep)

      - name: Telemetry guard
        run: ./scripts/check-no-telemetry.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        run: cargo audit

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --exclude zstash-app-tauri -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --exclude zstash-app-tauri

      - name: cargo test (migrations)
        run: cargo test -p zstash-engine --test app_db_migrations --test wallet_db_encryption_and_migrations

  # Job 2: Release build (sequential after rust-fast to share toolchain)
  rust-build:
    name: Rust Build (release)
    needs: rust-fast
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
      RUSTUP_HOME: /tmp/rust-${{ github.run_id }}/.rustup
      CARGO_HOME: /tmp/rust-${{ github.run_id }}/.cargo
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false

      - name: cargo build (release)
        run: cargo build --workspace --release --locked --exclude zstash-app-tauri

      - name: Cleanup rust dir
        if: always()
        run: rm -rf /tmp/rust-${{ github.run_id }}

  # Job 3: Bun tests (independent, runs in parallel with Rust jobs)
  bun-tests:
    name: Bun Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: apps/zstash-app-tauri
        run: bun install --frozen-lockfile
      - name: bun test
        working-directory: apps/zstash-app-tauri
        run: bun run test
      - name: bun test:a11y (if present)
        working-directory: apps/zstash-app-tauri
        run: |
          if node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(p.scripts && p.scripts['test:a11y'] ? 0 : 1)"; then
            bun run test:a11y
          else
            echo "No test:a11y script; skipping"
          fi
