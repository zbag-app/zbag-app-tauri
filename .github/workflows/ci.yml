# CI optimized for current self-hosted runner setup:
# - 4 runners on single machine (8c/16t, 32GB RAM, NVMe)
# - All Rust work runs sequentially to avoid resource contention
# - TODO: Split into parallel jobs when more hardware available
name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (audit + clippy + tests + e2e)
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
      # Single endpoint; can use matrix strategy for multi-endpoint testing if needed
      ZSTASH_GRPC_URL: https://lwd.testnet.zec.pro
    steps:
      - uses: actions/checkout@v4

      # Telemetry guard - no Rust needed
      - name: Telemetry guard
        run: ./scripts/check-no-telemetry.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        run: cargo audit

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --exclude zstash-app-tauri -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --exclude zstash-app-tauri

      - name: cargo test (migrations)
        run: cargo test -p zstash-engine --test app_db_migrations --test wallet_db_encryption_and_migrations

      # E2E tests
      - name: Set test home
        run: echo "ZSTASH_TEST_HOME=${{ runner.temp }}/zstash-e2e" >> $GITHUB_ENV

      - name: Install frontend dependencies
        working-directory: apps/zstash-app-tauri
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/zstash-app-tauri
        run: bunx playwright install chromium

      - name: Build test bridge
        run: cargo build -p zstash-app-tauri --features test-bridge

      - name: Start test bridge
        run: |
          rm -rf "$ZSTASH_TEST_HOME"
          mkdir -p "$ZSTASH_TEST_HOME"
          BRIDGE_LOG="${RUNNER_TEMP}/zstash-test-bridge.log"
          BRIDGE_PID="${RUNNER_TEMP}/zstash-test-bridge.pid"
          cargo run -p zstash-app-tauri --features test-bridge > "$BRIDGE_LOG" 2>&1 &
          echo $! > "$BRIDGE_PID"
          for i in {1..30}; do
            if ! kill -0 $(cat "$BRIDGE_PID") 2>/dev/null; then
              echo "Test bridge process died unexpectedly"
              cat "$BRIDGE_LOG" || true
              exit 1
            fi
            if curl -sf http://127.0.0.1:19816/health > /dev/null; then
              echo "Test bridge ready"
              exit 0
            fi
            sleep 1
          done
          echo "Test bridge failed to start within 30s"
          cat "$BRIDGE_LOG" || true
          exit 1

      - name: Run Playwright tests
        working-directory: apps/zstash-app-tauri
        run: bun run test:e2e

      - name: Upload test bridge log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-bridge-log
          path: ${{ runner.temp }}/zstash-test-bridge.log
          retention-days: 7

      - name: Stop test bridge
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/zstash-test-bridge.pid" ]; then
            kill $(cat "${RUNNER_TEMP}/zstash-test-bridge.pid") || true
          fi

  rust-build:
    name: Rust Build (release)
    runs-on: self-hosted
    needs: [rust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false
      - run: cargo build --workspace --release --locked --exclude zstash-app-tauri

  bun-tests:
    name: Bun Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: apps/zstash-app-tauri
        run: bun install --frozen-lockfile
      - name: bun test
        working-directory: apps/zstash-app-tauri
        run: bun run test
      - name: bun test:a11y (if present)
        working-directory: apps/zstash-app-tauri
        run: |
          if node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(p.scripts && p.scripts['test:a11y'] ? 0 : 1)"; then
            bun run test:a11y
          else
            echo "No test:a11y script; skipping"
          fi
