name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  telemetry-guard:
    name: Telemetry Guard
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-no-telemetry.sh

  rust-audit:
    name: Rust Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  rust-clippy:
    name: Rust Clippy
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: false
      - run: cargo clippy --workspace --all-targets --exclude zstash-app-tauri -- -D warnings

  rust-tests:
    name: Rust Tests
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
      ZSTASH_GRPC_URL: https://lwd.testnet.zec.pro
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: cargo test --workspace --exclude zstash-app-tauri

  rust-migrations:
    name: Rust Migration Tests
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: cargo test -p zstash-engine --test app_db_migrations --test wallet_db_encryption_and_migrations

  rust-build:
    name: Rust Build (release)
    needs: [telemetry-guard, rust-audit, rust-tests, rust-clippy, rust-migrations, bun-tests]
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: cargo build --workspace --release --locked --exclude zstash-app-tauri

  bun-tests:
    name: Bun Tests
    needs: [telemetry-guard]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: apps/zstash-app-tauri
        run: bun install --frozen-lockfile
      - name: bun test
        working-directory: apps/zstash-app-tauri
        run: bun run test
      - name: bun test:a11y (if present)
        working-directory: apps/zstash-app-tauri
        run: |
          if node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(p.scripts && p.scripts['test:a11y'] ? 0 : 1)"; then
            bun run test:a11y
          else
            echo "No test:a11y script; skipping"
          fi

