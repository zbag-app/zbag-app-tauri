# CI optimized for self-hosted runner setup:
# - 4 runners on single machine (8c/16t, 32GB RAM, NVMe)
# - 2 parallel Rust jobs + bun-tests
# - Per-job RUSTUP_HOME/CARGO_HOME isolation to prevent race conditions
name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
  push:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Fast checks - tests, clippy, audit
  rust-fast:
    name: Rust Fast (tests + clippy + audit)
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
      RUSTUP_HOME: ${{ runner.temp }}/.rustup
      CARGO_HOME: ${{ runner.temp }}/.cargo
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep (for act compatibility)
        run: command -v rg >/dev/null 2>&1 || (apt-get update && apt-get install -y ripgrep)

      - name: Telemetry guard
        run: ./scripts/check-no-telemetry.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        run: cargo audit

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --exclude zstash-app-tauri -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace --exclude zstash-app-tauri

      - name: cargo test (migrations)
        run: cargo test -p zstash-engine --test app_db_migrations --test wallet_db_encryption_and_migrations

  # Job 2: Release build
  rust-build:
    name: Rust Build (release)
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
      RUSTUP_HOME: ${{ runner.temp }}/.rustup
      CARGO_HOME: ${{ runner.temp }}/.cargo
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          cache-bin: false

      - name: cargo build (release)
        run: cargo build --workspace --release --locked --exclude zstash-app-tauri

  # Job 3: Bun tests (independent)
  bun-tests:
    name: Bun Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: apps/zstash-app-tauri
        run: bun install --frozen-lockfile
      - name: bun test
        working-directory: apps/zstash-app-tauri
        run: bun run test
      - name: bun test:a11y (if present)
        working-directory: apps/zstash-app-tauri
        run: |
          if node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(p.scripts && p.scripts['test:a11y'] ? 0 : 1)"; then
            bun run test:a11y
          else
            echo "No test:a11y script; skipping"
          fi
