name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'specs/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  telemetry-guard:
    name: Telemetry Guard
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-no-telemetry.sh

  cef-network-hardening:
    name: CEF Network Hardening
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-cef-network-hardening.sh
      - run: BAGZ_SMOKE_SELFTEST=1 ./scripts/cef-network-smoketest.sh

  cef-args-tests:
    name: CEF Args Tests
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: cargo test -p bagz-app-tauri --features cef-runtime --test cef_runtime_args

  rust-audit:
    name: Rust Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  rust-clippy:
    name: Rust Clippy
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: false
      - run: cargo clippy --workspace --all-targets --exclude bagz-app-tauri -- -D warnings

  rust-tests:
    name: Rust Tests
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
      BAGZ_GRPC_URL: https://testnet.zec.rocks
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: cargo test --workspace --exclude bagz-app-tauri

  rust-migrations:
    name: Rust Migration Tests
    runs-on: self-hosted
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: cargo test -p bagz-engine --test app_db_migrations --test wallet_db_encryption_and_migrations

  tauri-build-cef:
    name: Tauri Build (CEF)
    runs-on: self-hosted
    needs: [telemetry-guard, cef-network-hardening, cef-args-tests, rust-tests, rust-clippy, rust-migrations, bun-tests]
    timeout-minutes: 40
    env:
      CARGO_BUILD_JOBS: "16"
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        run: make install
      - name: Build Tauri bundles on CEF path
        run: make tauri-build
      - name: CEF network smoke
        if: runner.os == 'macOS'
        run: ./scripts/cef-network-smoketest.sh
      - name: Upload CEF network smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cef-network-smoketest-log
          path: ${{ runner.temp }}/bagz-cef-smoketest.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload Tauri bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundles-cef
          path: |
            target/release/bundle/macos/*.app
            target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
          retention-days: 7

  rust-build:
    name: Rust Build (release)
    needs: [telemetry-guard, rust-audit, rust-tests, rust-clippy, rust-migrations, bun-tests, tauri-build-cef]
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CARGO_BUILD_JOBS: "16"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - run: cargo build --workspace --release --locked --exclude bagz-app-tauri

  bun-tests:
    name: Bun Tests
    runs-on: self-hosted
    needs: [telemetry-guard]
    timeout-minutes: 10
    concurrency:
      group: bun-lock-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: apps/bagz-app-tauri
        run: bun install --frozen-lockfile
      - name: bun test
        working-directory: apps/bagz-app-tauri
        run: bun run test
      - name: bun test:a11y (if present)
        working-directory: apps/bagz-app-tauri
        run: |
          if node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(p.scripts && p.scripts['test:a11y'] ? 0 : 1)"; then
            bun run test:a11y
          else
            echo "No test:a11y script; skipping"
          fi

  playwright-e2e:
    name: Playwright E2E
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Set test home
        run: echo "BAGZ_TEST_HOME=${{ runner.temp }}/bagz-e2e" >> $GITHUB_ENV
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install dependencies
        working-directory: apps/bagz-app-tauri
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: apps/bagz-app-tauri
        run: |
          bun --version
          bunx playwright install chromium
      - name: Build test bridge
        run: cargo build -p bagz-app-tauri --features test-bridge
      - name: Start test bridge
        run: |
          rm -rf "$BAGZ_TEST_HOME"
          mkdir -p "$BAGZ_TEST_HOME"
          BRIDGE_LOG="${RUNNER_TEMP}/bagz-test-bridge.log"
          BRIDGE_PID="${RUNNER_TEMP}/bagz-test-bridge.pid"
          cargo run -p bagz-app-tauri --features test-bridge > "$BRIDGE_LOG" 2>&1 &
          echo $! > "$BRIDGE_PID"
          for i in {1..30}; do
            if ! kill -0 $(cat "$BRIDGE_PID") 2>/dev/null; then
              echo "Test bridge process died unexpectedly"
              cat "$BRIDGE_LOG" || true
              exit 1
            fi
            if curl -sf http://127.0.0.1:19816/health > /dev/null; then
              echo "Test bridge ready"
              exit 0
            fi
            sleep 1
          done
          echo "Test bridge failed to start within 30s"
          cat "$BRIDGE_LOG" || true
          exit 1
      - name: Run Playwright tests
        working-directory: apps/bagz-app-tauri
        run: bun run test:e2e
      - name: Upload test bridge log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-bridge-log
          path: ${{ runner.temp }}/bagz-test-bridge.log
          retention-days: 7
      - name: Stop test bridge
        if: always()
        run: |
          if [ -f "${RUNNER_TEMP}/bagz-test-bridge.pid" ]; then
            kill $(cat "${RUNNER_TEMP}/bagz-test-bridge.pid") || true
          fi
