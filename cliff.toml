# git-cliff configuration for zSTASH
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to zSTASH will be documented in this file.

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}
    {% endfor %}
{% endfor %}
"""
footer = """
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
    # Skip noise patterns (review iterations, PR-scoped fixes, merges, CI triggers)
    { message = "(?i)address.*review", skip = true },
    { message = "(?i)address.*PR", skip = true },
    { message = "(?i)address.*feedback", skip = true },
    { message = "^(fix|chore|refactor|perf)\\(pr-\\d+\\)", skip = true },
    { message = "(?i)^Merge", skip = true },
    { message = "(?i)trigger ci", skip = true },

    # Skip CI/CD commits entirely
    { message = "^ci", skip = true },

    # Skip Claude-related commits
    { message = "(?i)claude", skip = true },
    { message = "(?i)CLAUDE\\.md", skip = true },

    # Skip internal developer documentation
    { message = "(?i)local CI testing", skip = true },
    { message = "(?i)non-interactive rebase", skip = true },

    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore:.*bump version", skip = true },
    { message = "^chore:.*update changelog", skip = true },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^build", group = "Build" },
    { message = "^revert", group = "Reverted" },
    # User story commits (project-specific)
    { message = "^US\\d+:", group = "Features" },
    # Catch-all for non-conventional commits
    { body = ".*", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"
