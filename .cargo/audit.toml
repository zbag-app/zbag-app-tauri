[advisories]
# Consensus/security crates that are yanked must block the gate. `make audit`
# and CI use `cargo audit --deny yanked` so a yanked Orchard/halo2 train cannot
# hide as a non-failing warning while still affecting transaction correctness.
# `rsa` is pulled in via Arti/Tor (`tor-llcrypto`) for public-key operations in the Tor client.
# The Marvin attack advisory targets RSA *decryption* timing side-channels; zbag does not
# perform RSA private-key operations via this dependency.
# `time` is transitive via `zcash_client_backend` and currently pinned through `time-core = 0.1.2`.
# `RUSTSEC-2026-0009` is fixed in `time >= 0.3.47`, but that requires `time-core = 0.1.8`,
# which cannot be selected until upstream Zcash deps relax their exact `time-core` pin.
# `quick-xml` is transitive through `plist 1.8.0` (Tauri/xtask plist metadata parsing).
# The fixed `plist 1.9.0` also requires `time >= 0.3.47`, which conflicts with the
# same upstream librustzcash `time-core = 0.1.2` pin. Revisit both ignores together
# when the next stable librustzcash train relaxes that exact `time-core` dependency.
ignore = [
  "RUSTSEC-2023-0071",
  "RUSTSEC-2026-0009",
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
]
